<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มเก็บข้อมูลนักเรียน</title>
    <style>
        /* --- General Reset & Fonts --- */
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* --- Container Layout --- */
        .form-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 149, 255, 0.1);
            padding: 40px;
            border-top: 8px solid #0284c7;
        }

        .form-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .form-header h1 {
            color: #0369a1;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #64748b;
            font-size: 15px;
        }

        /* --- Form Elements Styling --- */
        fieldset {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            background-color: #f8fafc;
        }

        legend {
            font-size: 18px;
            font-weight: 600;
            color: #0369a1;
            padding: 0 12px;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
        }

        /* Grid System สำหรับจัดระเบียบฟอร์มบนจอคอม */
        .grid-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 15px;
        }

        /* กรณีต้องการให้ช่องกว้างไม่เท่ากัน */
        .grid-3-columns {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 6px;
        }

        /* Input Controls */
        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            color: #1e293b;
            background-color: #ffffff;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
            background-color: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Option Group (Radio & Checkbox) */
        .options-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding-top: 8px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 15px;
            color: #334155;
        }

        .option-item input {
            width: 18px;
            height: 18px;
            accent-color: #0284c7;
            cursor: pointer;
        }

        /* Special Inputs (Color & File) */
        input[type="color"] {
            -webkit-appearance: none;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            width: 100%;
            height: 42px;
            cursor: pointer;
            background: none;
            padding: 2px;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 6px;
        }

        input[type="file"] {
            border: 1px dashed #cbd5e1;
            padding: 12px;
            background-color: #ffffff;
            border-radius: 8px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background-color: #e0f2fe;
            color: #0369a1;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            margin-right: 10px;
            transition: background 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: #bae6fd;
        }

        /* --- Terms & Buttons Zone --- */
        .terms-container {
            margin: 25px 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        button[type="submit"] {
            background-color: #0284c7;
            color: #ffffff;
            box-shadow: 0 4px 6px rgba(2, 132, 199, 0.2);
        }

        button[type="submit"]:hover {
            background-color: #0369a1;
            transform: translateY(-1px);
        }

        button[type="reset"] {
            background-color: #f1f5f9;
            color: #64748b;
            border: 1px solid #cbd5e1;
        }

        button[type="reset"]:hover {
            background-color: #e2e8f0;
            color: #334155;
        }

        /* --- Responsive Design (Mobile) --- */
        @media (max-width: 768px) {
            body {
                padding: 15px 10px;
            }

            .form-container {
                padding: 20px;
            }

            .grid-3-columns {
                grid-template-columns: 1fr;
            }

            fieldset {
                padding: 15px;
            }

            .button-group {
                flex-direction: column-reverse;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h1>ระบบลงทะเบียนข้อมูลนักเรียน</h1>
            <p>กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้องตามความเป็นจริง</p>
        </div>

        <form action="#" method="POST" autocomplete="on">

            <!-- 1. ข้อมูลส่วนตัว -->
            <fieldset>
                <legend>1. ข้อมูลส่วนตัว</legend>
                <div class="grid-3-columns">
                    <div class="form-group">
                        <label for="prefix">คำนำหน้า</label>
                        <select id="prefix" name="prefix" required>
                            <option value="" disabled selected>เลือก...</option>
                            <option value="เด็กชาย">เด็กชาย</option>
                            <option value="เด็กหญิง">เด็กหญิง</option>
                            <option value="นาย">นาย</option>
                            <option value="นางสาว">นางสาว</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fullname">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullname" name="fullname" placeholder="สมชาย ใจดี" required>
                    </div>
                    <div class="form-group">
                        <label for="nickname">ชื่อเล่น</label>
                        <input type="text" id="nickname" name="nickname" placeholder="ต้น">
                    </div>
                </div>

                <div class="grid-row">
                    <div class="form-group">
                        <label for="student-id">เลขประจำตัวนักเรียน</label>
                        <input type="number" id="student-id" name="student_id" placeholder="5 หลัก" min="10000" max="99999" required>
                    </div>
                    <div class="form-group">
                        <label for="birthdate">วันเดือนปีเกิด</label>
                        <input type="date" id="birthdate" name="birthdate" required>
                    </div>
                    <div class="form-group">
                        <label for="age">อายุ (ปี)</label>
                        <input type="number" id="age" name="age" placeholder="เช่น 15" min="1" max="99" required>
                    </div>
                </div>
            </fieldset>

            <!-- 2. ข้อมูลการติดต่อ -->
            <fieldset>
                <legend>2. ข้อมูลการติดต่อ</legend>
                <div class="grid-row">
                    <div class="form-group">
                        <label for="email">อีเมล</label>
                        <input type="email" id="email" name="email" placeholder="example@school.ac.th" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" name="phone" placeholder="08XXXXXXXX" pattern="[0-9]{10}" required>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label for="address">ที่อยู่ปัจจุบัน</label>
                    <textarea id="address" name="address" rows="3" placeholder="บ้านเลขที่, ถนน, ตำบล, อำเภอ..." required></textarea>
                </div>
            </fieldset>

            <!-- 3. ข้อมูลส่วนบุคคล -->
            <fieldset>
                <legend>3. ข้อมูลส่วนบุคคล</legend>
                <div class="grid-row">
                    <div class="form-group">
                        <label>เพศ</label>
                        <div class="options-group">
                            <label class="option-item">
                                <input type="radio" name="gender" value="ชาย" required> ชาย
                            </label>
                            <label class="option-item">
                                <input type="radio" name="gender" value="หญิง"> หญิง
                            </label>
                            <label class="option-item">
                                <input type="radio" name="gender" value="อื่นๆ"> อื่นๆ
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="religion">ศาสนา</label>
                        <select id="religion" name="religion" required>
                            <option value="" disabled selected>เลือกศาสนา...</option>
                            <option value="พุทธ">พุทธ</option>
                            <option value="คริสต์">คริสต์</option>
                            <option value="อิสลาม">อิสลาม</option>
                            <option value="ฮินดู">ฮินดู</option>
                            <option value="อื่นๆ">อื่นๆ/ไม่ระบุ</option>
                        </select>
                    </div>
                </div>
                <div class="grid-row">
                    <div class="form-group">
                        <label for="province">จังหวัดเกิด</label>
                        <input type="text" id="province" name="province" placeholder="เช่น เชียงใหม่" required>
                    </div>
                    <div class="form-group">
                        <label for="blood-type">กรุ๊ปเลือด</label>
                        <select id="blood-type" name="blood_type" required>
                            <option value="" disabled selected>เลือก...</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="O">O</option>
                            <option value="AB">AB</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- 4. ความสนใจ -->
            <fieldset>
                <legend>4. ความสนใจ</legend>
                <div class="form-group">
                    <label>งานอดิเรก (เลือกได้มากกว่า 1 ข้อ)</label>
                    <div class="options-group">
                        <label class="option-item">
                            <input type="checkbox" name="hobbies[]" value="อ่านหนังสือ"> อ่านหนังสือ
                        </label>
                        <label class="option-item">
                            <input type="checkbox" name="hobbies[]" value="เล่นกีฬา/ออกกำลังกาย"> เล่นกีฬา
                        </label>
                        <label class="option-item">
                            <input type="checkbox" name="hobbies[]" value="เล่นเกม/ดูหนัง"> เล่นเกม/ดูหนัง
                        </label>
                        <label class="option-item">
                            <input type="checkbox" name="hobbies[]" value="วาดภาพ/ร้องเพลง"> ศิลปะ/ดนตรี
                        </label>
                    </div>
                </div>
                <div class="grid-row">
                    <div class="form-group">
                        <label for="fav-color">สีที่ชอบ</label>
                        <input type="color" id="fav-color" name="fav_color" value="#0284c7">
                    </div>
                    <div class="form-group">
                        <label for="fav-url">เว็บไซต์ที่ชอบ (URL)</label>
                        <input type="url" id="fav-url" name="fav_url" placeholder="https://example.com">
                    </div>
                </div>
            </fieldset>

            <!-- 5. ข้อมูลการศึกษา -->
            <fieldset>
                <legend>5. ข้อมูลการศึกษา</legend>
                <div class="grid-row">
                    <div class="form-group">
                        <label for="education-level">ระดับชั้น</label>
                        <select id="education-level" name="education_level" required>
                            <option value="" disabled selected>เลือกระดับชั้น...</option>
                            <option value="ม.1">มัธยมศึกษาปีที่ 1</option>
                            <option value="ม.2">มัธยมศึกษาปีที่ 2</option>
                            <option value="ม.3">มัธยมศึกษาปีที่ 3</option>
                            <option value="ม.4">มัธยมศึกษาปีที่ 4</option>
                            <option value="ม.5">มัธยมศึกษาปีที่ 5</option>
                            <option value="ม.6">มัธยมศึกษาปีที่ 6</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="classroom">ห้องเรียน</label>
                        <input type="number" id="classroom" name="classroom" placeholder="เช่น 1" min="1" max="15" required>
                    </div>
                </div>
                <div class="grid-row">
                    <div class="form-group">
                        <label for="program">แผนการเรียน</label>
                        <input type="text" id="program" name="program" placeholder="เช่น วิทย์-คณิต / ศิลป์-ภาษา" required>
                    </div>
                    <div class="form-group">
                        <label for="gpa">เกรดเฉลี่ยสะสม (GPAX)</label>
                        <input type="number" id="gpa" name="gpa" placeholder="0.00 - 4.00" min="0.00" max="4.00" step="0.01" required>
                    </div>
                </div>
            </fieldset>

            <!-- 6. การอัปโหลดไฟล์ -->
            <fieldset>
                <legend>6. การอัปโหลดไฟล์</legend>
                <div class="grid-row">
                    <div class="form-group">
                        <label for="avatar">รูปภาพประจำตัว (PNG, JPG)</label>
                        <input type="file" id="avatar" name="avatar" accept="image/*" required>
                    </div>
                    <div class="form-group">
                        <label for="documents">เอกสารเพิ่มเติม (PDF)</label>
                        <input type="file" id="documents" name="documents" accept=".pdf">
                    </div>
                </div>
            </fieldset>

            <!-- 7. ความคิดเห็นเพิ่มเติม -->
            <fieldset>
                <legend>7. ความคิดเห็นเพิ่มเติม</legend>
                <div class="form-group full-width">
                    <label for="comments">แสดงความคิดเห็นหรือข้อมูลเพิ่มเติมที่ต้องการแจ้งโรงเรียน</label>
                    <textarea id="comments" name="comments" placeholder="พิมพ์ข้อความของคุณที่นี่..."></textarea>
                </div>
            </fieldset>

            <!-- 8. ยืนยันข้อมูล -->
            <div class="terms-container">
                <label class="option-item">
                    <input type="checkbox" name="agreement" value="accepted" required>
                    ข้าพเจ้ายินยอมและรับรองว่าข้อมูลข้างต้นเป็นความจริงทุกประการ
                </label>
            </div>

            <div class="button-group">
                <button type="reset">ล้างข้อมูล</button>
                <button type="submit">ส่งข้อมูล</button>
            </div>

        </form>
    </div>

</body>
</html>
